openapi: 3.0.3
info:
  title: host-rutebayar
  version: 0.1.0
  description: Orchestrator API draft for marketplace-host payment routing.
servers:
  - url: /v1
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Host-Secret
security:
  - apiKey: []
paths:
  /payments:
    post:
      security:
        - apiKey: []
      summary: Create payment order
      responses:
        '202':
          description: Payment intent created
  /payments/{reference}:
    get:
      parameters:
        - in: path
          name: reference
          required: true
          schema:
            type: string
      summary: Get payment status
      responses:
        '200':
          description: Payment status
  /webhooks/{provider}:
    post:
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      summary: Receive provider webhook
      responses:
        '202':
          description: Webhook accepted
